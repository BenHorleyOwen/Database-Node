<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Loading...</title>
    <link rel="stylesheet" id="themeStylesheet" href="">
</head>
<body>
    <div class="container">
        <div class="card-secondary">
            <h1 id="siteTitle"></h1>
        </div>
        <div class="card-primary">
            <h2 id="siteSubtitle"></h2>
        

            <div id="redirects"></div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="datapoints">...</div>
                    <div class="stat-label">Total Businesses</div>
                </div>
            </div>


            <!-- TODO: Update landing text to note correct api sources -->
            <div class="landing-info">
                <p>Powered by multiple data sources</p>
            </div>
        </div>
    </div>

    <!-- Load configuration first -->
    <script src="config.js"></script>

    <script>
        function initializePage() {
            // Set page title
            document.getElementById('pageTitle').textContent = CONFIG.page.landing;
            document.getElementById('siteTitle').textContent =
                `${CONFIG.site.title}`;
            document.getElementById('siteSubtitle').textContent =
                `${CONFIG.site.subtitle}`;

            document.getElementById('themeStylesheet').href =
                `styles-${CONFIG.theme}.css`;

            // Add directory buttons
            buildLandingPage();

            setupEventListeners();
        }

        function buildLandingPage() {
            const container = document.getElementById('redirects');

            container.innerHTML =
                `<div class="button-group">
                    <a href="/search.html" class="button-primary">
                        Start Searching
                    </a>
                    <a href="/api/data" class="button-primary">
                        View API Data
                    </a>
                </div>`;

        };

        function setupEventListeners() {
            //TODO: Add routing 
        }

        // Pull database stats for display
        const collectionKey = CONFIG.data.collectionKey;
        const totalCountId = CONFIG.data.dom.totalCountId;
        document.querySelector('.stat-value').id = totalCountId;

        fetch(`${CONFIG.api.baseUrl}${CONFIG.api.dataEndpoint}`)
            .then(r => r.json())
            .then(data => {
                const collection = data[collectionKey] ?? data;
                document.getElementById(totalCountId).textContent =
                    Array.isArray(collection)
                        ? collection.length.toLocaleString()
                        : '-';
            })
            .catch(() => {
                document.getElementById(totalCountId).textContent = '-';
            });

        // Page initialization
        window.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
