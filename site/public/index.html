<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Loading...</title>
    <link rel="stylesheet" id="themeStylesheet" href="">
</head>
<body>
    <div class="landing-container">
        <div class="landing-card">
            <h1 class="landing-title">Business Directory</h1>
            <p class="landing-subtitle">Search and discover businesses across the UK</p>

            <div class="redirect-btns" id="redirects"></div>
            <!-- TODO: Move button/card/class declarations to after config loading -->
            <div class="button-group">
                <a href="/search.html" class="btn btn-primary">
                    Start Searching
                </a>
                <a href="/api/data" class="btn btn-secondary">
                    View API Data
                </a>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="datapoints">...</div>
                    <div class="stat-label">Total Businesses</div>
                </div>
            </div>

            <div class="landing-info">
                <p>Powered by multiple data sources</p>
            </div>
        </div>
    </div>

    <!-- Load configuration first -->
    <script src="config.js"></script>

    <script>
        function initializePage() {
            // Set page title
            document.getElementById('pageTitle').textContent = CONFIG.site.title;
            document.getElementById('siteTitle').textContent =
                `${CONFIG.site.title}`;

            document.getElementById('themeStylesheet').href =
                `styles-${CONFIG.theme}.css`;
        }

        const collectionKey = CONFIG.data.collectionKey;
        const totalCountId = CONFIG.data.dom.totalCountId;
        document.querySelector('.stat-value').id = totalCountId;

        fetch(`${CONFIG.api.baseUrl}${CONFIG.api.dataEndpoint}`)
            .then(r => r.json())
            .then(data => {
                const collection = data[collectionKey] ?? data;
                document.getElementById(totalCountId).textContent =
                    Array.isArray(collection)
                        ? collection.length.toLocaleString()
                        : '-';
            })
            .catch(() => {
                document.getElementById(totalCountId).textContent = '-';
            });
    </script>
</body>
</html>
